<!DOCTYPE html>
<html>
<head>
  <title>Vector Benchmark Mobile</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <style>
    body { margin: 0; background: #0c0c0c; color: #00ffff; font-family: sans-serif; overflow: hidden; }
    #container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
    video { display: none; }
    canvas { width: 100%; height: 100%; object-fit: cover; }
    #hud {
      position: absolute; top: 20px; left: 20px; width: 280px;
      background: rgba(12, 12, 12, 0.85); border: 1px solid #00ffff;
      border-top: 3px solid #ff00ff; padding: 15px; box-sizing: border-box;
    }
    .metric { font-size: 14px; margin-bottom: 8px; color: #e0e0e0; }
    #score-box { margin-top: 15px; border-top: 1px solid #00ffff; padding-top: 10px; }
    #score { font-size: 24px; color: #ff00ff; font-weight: bold; }
    #tier { font-size: 32px; font-weight: bold; }
  </style>
</head>
<body>
  <div id="container">
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
    <div id="hud">
      <div style="font-weight:bold; margin-bottom:15px;">BIOMETRIC VECTOR [MOBILE]</div>
      <div id="metrics"></div>
      <div id="score-box">
        <div id="score">SCORE: --</div>
        <div id="tier">SCANNING...</div>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById('input_video');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d');
    const metricDiv = document.getElementById('metrics');
    const scoreDiv = document.getElementById('score');
    const tierDiv = document.getElementById('tier');

    let smoothed = {};
    const smooth = (key, val) => {
      if (!smoothed[key]) smoothed[key] = val;
      smoothed[key] = (0.15 * val) + (0.85 * smoothed[key]);
      return smoothed[key];
    };

    const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);

    function onResults(results) {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const lm = results.multiFaceLandmarks[0];
        
        // Math Ports from Python
        const cheekW = dist(lm[234], lm[454]);
        const fwhrH = dist(lm[9], lm[164]);
        const fwhr = smooth('fwhr', cheekW / fwhrH);
        
        const noseBase = lm[2], chin = lm[152], lipT = lm[0], lipB = lm[17];
        const pcRatio = smooth('pc', dist(lipB, chin) / dist(noseBase, lipT));
        
        const eyeW = dist(lm[133], lm[33]);
        const interOc = dist(lm[133], lm[362]);
        const spacing = smooth('spacing', interOc / eyeW);

        // Scoring
        let s = 100;
        s -= Math.abs(pcRatio - 2.1) * 10;
        s -= Math.abs(spacing - 1.0) * 15;
        s -= Math.abs(fwhr - 1.9) * 10;
        const finalScore = smooth('score', Math.max(1, Math.min(s, 99.8)));

        // Tier Logic
        let title = "SUB-TIER", color = "#ff00ff";
        if (finalScore >= 96) { title = "TRUE ADAM"; color = "#00ff96"; }
        else if (finalScore >= 90) { title = "CHAD"; color = "#00ff96"; }
        else if (finalScore >= 80) { title = "CHADLITE"; color = "#00ffff"; }
        else if (finalScore >= 70) { title = "HTN"; color = "#00ffff"; }

        // UI Update
        metricDiv.innerHTML = `
          <div class="metric">FWHR: ${fwhr.toFixed(2)}</div>
          <div class="metric">P-C RATIO: ${pcRatio.toFixed(2)}</div>
          <div class="metric">EYE SPACE: ${spacing.toFixed(2)}</div>
        `;
        scoreDiv.innerText = `SCORE: ${finalScore.toFixed(1)}`;
        tierDiv.innerText = title;
        tierDiv.style.color = color;
      }
    }

    const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5});
    faceMesh.onResults(onResults);

    const camera = new Camera(video, {
      onFrame: async () => { await faceMesh.send({image: video}); },
      width: 640, height: 480
    });
    camera.start();
  </script>
</body>
</html>
